<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #0a0e1a; }
      .grid-line { stroke: #1a2535; stroke-width: 0.5; }

      /* Scan line sweep */
      .scanline {
        fill: none;
        stroke: #00ff88;
        stroke-width: 1;
        opacity: 0;
        animation: scan 4s ease-in-out infinite;
      }
      @keyframes scan {
        0%   { opacity: 0; transform: translateY(0); }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.4; }
        100% { opacity: 0; transform: translateY(280px); }
      }

      /* Main title */
      .title {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 58px;
        font-weight: bold;
        fill: url(#titleGrad);
        letter-spacing: 6px;
        animation: titlePulse 3s ease-in-out infinite alternate;
      }
      @keyframes titlePulse {
        from { filter: drop-shadow(0 0 8px #00ff88aa); }
        to   { filter: drop-shadow(0 0 20px #00ff88ff) drop-shadow(0 0 40px #00ff8855); }
      }

      /* Subtitle */
      .subtitle {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #4ade80;
        letter-spacing: 3px;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 0.6s forwards;
      }

      /* Tagline */
      .tagline {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #94a3b8;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 1.1s forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* Hex nodes */
      .node {
        fill: none;
        stroke: #00ff88;
        stroke-width: 1;
        opacity: 0;
      }
      .node-fill { fill: #00ff8818; }

      .n1 { animation: nodeAppear 0.4s ease-out 1.4s forwards; }
      .n2 { animation: nodeAppear 0.4s ease-out 1.7s forwards; }
      .n3 { animation: nodeAppear 0.4s ease-out 2.0s forwards; }
      .n4 { animation: nodeAppear 0.4s ease-out 2.3s forwards; }
      .n5 { animation: nodeAppear 0.4s ease-out 2.6s forwards; }

      @keyframes nodeAppear {
        from { opacity: 0; transform: scale(0.5); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* Connecting lines */
      .conn {
        stroke: #00ff8840;
        stroke-width: 0.8;
        stroke-dasharray: 4 3;
        opacity: 0;
        animation: fadeIn 0.5s ease-out 2.8s forwards;
      }

      /* Node labels */
      .nlabel {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 7.5px;
        fill: #00ff88;
        text-anchor: middle;
        opacity: 0;
        animation: fadeIn 0.5s ease-out 2.9s forwards;
      }

      /* Blinking cursor */
      .cursor {
        fill: #00ff88;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Corner decorations */
      .corner { stroke: #00ff8866; stroke-width: 1.5; fill: none; }

      /* Dot grid pulse */
      .dot {
        fill: #1e3a2a;
        animation: dotPulse 3s ease-in-out infinite alternate;
      }
      @keyframes dotPulse {
        from { opacity: 0.3; }
        to   { opacity: 0.8; }
      }

      /* Shield icon */
      .shield-outline {
        fill: none;
        stroke: #00ff88;
        stroke-width: 1.5;
        opacity: 0;
        animation: shieldIn 0.6s ease-out 0.2s forwards;
      }
      .shield-inner {
        fill: #00ff8812;
        opacity: 0;
        animation: shieldIn 0.6s ease-out 0.2s forwards;
      }
      @keyframes shieldIn {
        from { opacity: 0; transform: translateY(-5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Alert blink on right side */
      .alert-dot {
        fill: #ef4444;
        animation: alertBlink 1.4s ease-in-out infinite;
      }
      @keyframes alertBlink {
        0%, 100% { opacity: 1; r: 4; }
        50%       { opacity: 0.3; r: 6; }
      }
      .alert-ring {
        fill: none;
        stroke: #ef4444;
        stroke-width: 1;
        animation: alertRing 1.4s ease-out infinite;
      }
      @keyframes alertRing {
        0%   { r: 4;  opacity: 0.8; }
        100% { r: 14; opacity: 0; }
      }

      /* Status bar */
      .statusbar {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 8px;
        fill: #334155;
        letter-spacing: 1px;
      }
      .status-active {
        fill: #00ff88;
        animation: statusPulse 2s ease-in-out infinite;
      }
      @keyframes statusPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
    </style>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ff88"/>
      <stop offset="50%"  stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="8"/>

  <!-- Subtle grid -->
  <g opacity="0.4">
    <line x1="0" y1="40"  x2="900" y2="40"  class="grid-line"/>
    <line x1="0" y1="80"  x2="900" y2="80"  class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="900" y2="240" class="grid-line"/>
    <line x1="80"  y1="0" x2="80"  y2="280" class="grid-line"/>
    <line x1="200" y1="0" x2="200" y2="280" class="grid-line"/>
    <line x1="320" y1="0" x2="320" y2="280" class="grid-line"/>
    <line x1="440" y1="0" x2="440" y2="280" class="grid-line"/>
    <line x1="560" y1="0" x2="560" y2="280" class="grid-line"/>
    <line x1="680" y1="0" x2="680" y2="280" class="grid-line"/>
    <line x1="800" y1="0" x2="800" y2="280" class="grid-line"/>
  </g>

  <!-- Corner brackets -->
  <polyline points="12,40 12,12 40,12" class="corner"/>
  <polyline points="860,12 888,12 888,40" class="corner"/>
  <polyline points="12,240 12,268 40,268" class="corner"/>
  <polyline points="860,268 888,268 888,240" class="corner"/>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="2" class="scanline"/>

  <!-- Shield icon (left of title) -->
  <g transform="translate(195, 80)">
    <path d="M20,4 L36,10 L36,22 C36,30 28,36 20,40 C12,36 4,30 4,22 L4,10 Z"
          class="shield-inner"/>
    <path d="M20,4 L36,10 L36,22 C36,30 28,36 20,40 C12,36 4,30 4,22 L4,10 Z"
          class="shield-outline"/>
    <polyline points="13,22 18,27 27,16" stroke="#00ff88" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"
              opacity="0" style="animation: fadeIn 0.5s ease-out 0.7s forwards"/>
  </g>

  <!-- Main title -->
  <text x="450" y="132" text-anchor="middle" class="title">AEGISMIMIC</text>

  <!-- Subtitle -->
  <text x="450" y="158" text-anchor="middle" class="subtitle">HONEY DIRECTORY ENGINE  ·  LINUX</text>

  <!-- Tagline -->
  <text x="450" y="178" text-anchor="middle" class="tagline">"I Don't Want To Get Hacked, So I'll Max Out My Camouflage!"</text>

  <!-- Blinking cursor after tagline area -->
  <rect x="732" y="168" width="7" height="11" rx="1" class="cursor"
        opacity="0" style="animation: fadeIn 0s 1.1s forwards, blink 1s 1.1s step-end infinite"/>

  <!-- ── Bottom node cluster ── -->
  <!-- Connecting lines first (under nodes) -->
  <line x1="220" y1="230" x2="310" y2="222" class="conn"/>
  <line x1="310" y1="222" x2="390" y2="228" class="conn"/>
  <line x1="390" y1="228" x2="480" y2="220" class="conn"/>
  <line x1="480" y1="220" x2="560" y2="226" class="conn"/>
  <line x1="560" y1="226" x2="650" y2="222" class="conn"/>
  <line x1="650" y1="222" x2="720" y2="228" class="conn"/>

  <!-- Node 1: inotify -->
  <g transform="translate(220,230)" class="n1">
    <circle r="18" class="node-fill"/>
    <circle r="18" class="node" stroke="#00ff88"/>
    <circle r="12" class="node" stroke="#00ff8855"/>
    <text y="3"  class="nlabel">inotify</text>
  </g>
  <!-- Node 2: /proc -->
  <g transform="translate(340,222)" class="n2">
    <circle r="18" class="node-fill"/>
    <circle r="18" class="node" stroke="#00d4ff"/>
    <circle r="12" class="node" stroke="#00d4ff55"/>
    <text y="3" class="nlabel" fill="#00d4ff">/proc</text>
  </g>
  <!-- Node 3: policy -->
  <g transform="translate(450,230)" class="n3">
    <circle r="18" class="node-fill"/>
    <circle r="18" class="node" stroke="#a78bfa"/>
    <circle r="12" class="node" stroke="#a78bfa55"/>
    <text y="3" class="nlabel" fill="#a78bfa">policy</text>
  </g>
  <!-- Node 4: kill -->
  <g transform="translate(560,222)" class="n4">
    <circle r="18" class="node-fill"/>
    <circle r="18" class="node" stroke="#f97316"/>
    <circle r="12" class="node" stroke="#f9731655"/>
    <text y="3" class="nlabel" fill="#f97316">SIGKILL</text>
  </g>
  <!-- Node 5: audit -->
  <g transform="translate(670,230)" class="n5">
    <circle r="18" class="node-fill"/>
    <circle r="18" class="node" stroke="#facc15"/>
    <circle r="12" class="node" stroke="#facc1555"/>
    <text y="3" class="nlabel" fill="#facc15">audit</text>
  </g>

  <!-- Alert indicator top-right -->
  <g transform="translate(845, 36)">
    <circle r="14" class="alert-ring"/>
    <circle r="5"  class="alert-dot"/>
    <text x="0" y="24" text-anchor="middle" class="statusbar" fill="#ef4444" style="font-size:7px">ARMED</text>
  </g>

  <!-- Status bar bottom -->
  <text x="24"  y="264" class="statusbar">v1.0</text>
  <text x="70"  y="264" class="statusbar">·</text>
  <text x="80"  y="264" class="statusbar status-active">● WATCHING</text>
  <text x="180" y="264" class="statusbar">·</text>
  <text x="192" y="264" class="statusbar">MIT LICENSE</text>
  <text x="310" y="264" class="statusbar">·</text>
  <text x="322" y="264" class="statusbar">BUILT BY RIMU</text>
  <text x="450" y="264" class="statusbar">·</text>
  <text x="462" y="264" class="statusbar">PYTHON 3.9+</text>
  <text x="570" y="264" class="statusbar">·</text>
  <text x="582" y="264" class="statusbar">LINUX ONLY</text>
  <text x="680" y="264" class="statusbar">·</text>
  <text x="692" y="264" class="statusbar">KILL IN &lt;1s</text>
</svg>
